services:
    app:
        build:
            context: ./app
            dockerfile: Dockerfile
        ports:
            - '5000:5000'
        volumes:
            - ./app:/app
            - /app/.venv
        environment:
            - SUPABASE_URL=http://kong:8000
            - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
        env_file:
            - ./app/.env
        restart: always

networks:
    default:
        name: supabase_network_autoinvoice
        external: true
